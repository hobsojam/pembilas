name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar:
    # Dependabot PRs are routine version bumps with no meaningful diff for
    # static analysis, and Dependabot's read-only token can't see secrets
    # like SONAR_TOKEN anyway — skip the scan rather than fail the check.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
