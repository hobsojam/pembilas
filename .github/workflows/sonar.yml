name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar:
    # Dependabot PRs are routine version bumps with no meaningful diff for
    # static analysis, and Dependabot's read-only token can't see secrets
    # like SONAR_TOKEN anyway — skip the scan rather than fail the check.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      # Generates coverage/lcov.info, which sonar-project.properties points
      # Sonar at -- without this the scan has no coverage data to report.
      - run: npm run coverage

      - uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
